name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Build with Gradle
        # Using the gradle wrapper is recommended, but if not available, 
        # this action can handle it by specifying the gradle-version.
        # Ensure you have the wrapper added to your repo for best results.
        uses: gradle/gradle-build-action@v3
        with:
          arguments: assembleDebug
